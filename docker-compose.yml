services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 127.0.0.1:8080:8080
    environment:
      DB_PATH: /data/sbuxsync.db
      MEK: ${MEK}
      SCRAPER_IMAGE: sbuxsync-scraper-module:latest
      SCRAPER_CALLBACK_URL: http://app:8080
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      BASE_URL: https://${DOMAIN}
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal
      - scraper-exec
    restart: unless-stopped


networks:
  internal:
    driver: bridge
  scraper-exec:
    external: true
    name: sbuxsync_scraper-exec
