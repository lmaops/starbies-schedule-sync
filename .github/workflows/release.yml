name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/sbuxsync-app
  SCRAPER_IMAGE: ghcr.io/${{ github.repository_owner }}/sbuxsync-scraper

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          (cd web && npm ci && npm run build)
          rm -rf cmd/app/static
          cp -r web/dist cmd/app/static

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          SHA: ${{ steps.sha.outputs.short }}
          REPO: ${{ github.server_url }}/${{ github.repository }}
        run: |
          LDFLAGS="-X main.CommitSHA=${SHA} -X main.CommitURL=${REPO}/commit/${SHA}"
          mkdir -p dist
          GOOS=linux  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/sbuxsync-linux-amd64  ./cmd/app
          GOOS=linux  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/sbuxsync-linux-arm64  ./cmd/app
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/sbuxsync-darwin-amd64 ./cmd/app
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/sbuxsync-darwin-arm64 ./cmd/app

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (app)
        id: app-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.app-meta.outputs.tags }}
          labels: ${{ steps.app-meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ steps.sha.outputs.short }}
            COMMIT_URL=${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata (scraper)
        id: scraper-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SCRAPER_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push scraper image
        uses: docker/build-push-action@v6
        with:
          context: ./scraper
          push: true
          tags: ${{ steps.scraper-meta.outputs.tags }}
          labels: ${{ steps.scraper-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/sbuxsync-linux-amd64
            dist/sbuxsync-linux-arm64
            dist/sbuxsync-darwin-amd64
            dist/sbuxsync-darwin-arm64
